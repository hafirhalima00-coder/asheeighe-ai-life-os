name: asheeighe_core
description: Core domain models, services, and providers for asheeighe application.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.4.0
  intl: ^0.19.0
  drift: ^2.16.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.2.1+2

dev_dependencies:
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  mocktail: ^1.0.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
