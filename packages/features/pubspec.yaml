name: pinkz_features
description: Feature modules for PINKZ application (auth, tasks, notes, calendar, chat, etc.)
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  pinkz_core:
    path: ../core
  pinkz_ui:
    path: ../ui
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  dio: ^5.4.3+1
  uuid: ^4.4.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

dev_dependencies:
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  mocktail: ^1.0.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
