name: pinkz_services
description: Shared services layer for PINKZ application (API client, auth, storage, etc.)
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  pinkz_core:
    path: ../core
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3
  flutter_riverpod: ^2.5.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  build_runner: ^2.4.8
  mocktail: ^1.0.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
