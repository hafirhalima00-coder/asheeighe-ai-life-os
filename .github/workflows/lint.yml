name: Lint and Format Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  flutter:
    name: Flutter Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze
        continue-on-error: true

      - name: Check formatting
        run: dart format --dry-run --set-exit-if-changed .

      - name: Upload Flutter lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-lint-report
          path: flutter/**/analysis_options.yaml

  node:
    name: Node Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --format json --output-file eslint-report.json
        continue-on-error: true

      - name: Prettier
        run: npx prettier --check "**/*.{ts,js,json,md,yaml,yml}"
        continue-on-error: true

      - name: Upload Node lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-lint-report
          path: backend/eslint-report.json
