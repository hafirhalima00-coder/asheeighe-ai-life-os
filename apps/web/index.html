<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="asheeighe - Your personal productivity companion. Manage tasks, notes, calendar, and chat with AI.">
  <meta name="keywords" content="productivity, tasks, notes, calendar, AI, personal assistant">
  <meta name="author" content="asheeighe">
  <meta name="theme-color" content="#F4C2C2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="asheeighe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta property="og:title" content="asheeighe">
  <meta property="og:description" content="Your personal productivity companion">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://asheeighe.app">
  <meta property="og:image" content="/icons/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="asheeighe">
  <meta name="twitter:description" content="Your personal productivity companion">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">

  <title>asheeighe</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #flutter-placeholder {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FFF0F5 0%, #F8E8FF 100%);
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 107, 157, 0.2);
      border-top-color: #FF6B9D;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: #6B7280;
      font-size: 14px;
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service_worker.js')
          .then((registration) => {
            console.log('Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</head>
<body>
  <div id="flutter-placeholder">
    <div style="text-align: center;">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading asheeighe...</div>
    </div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.load({
        serviceWorkerSettings: {
          serviceWorkerVersion: '1.0.0',
        },
        onEntrypointLoaded: function(engineInitializer) {
          document.getElementById('flutter-placeholder').style.display = 'none';
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        },
      });
    });
  </script>
</body>
</html>
